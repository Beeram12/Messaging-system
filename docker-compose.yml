services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notif_user
      POSTGRES_PASSWORD: notif_pass
      POSTGRES_DB: notifications
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif_user -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: base
    command: python -m migrations.run_migrations
    environment:
      DATABASE_URL: postgresql+psycopg://notif_user:notif_pass@postgres:5432/notifications
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    ports:
      # Host 8000 is often taken (e.g. BuildKit); use 8001 externally.
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://notif_user:notif_pass@postgres:5432/notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: dev-local-api-key
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql+psycopg://notif_user:notif_pass@postgres:5432/notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 2

volumes:
  postgres_data:
